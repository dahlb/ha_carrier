name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  deployments: write

jobs:
  build:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get semantic release info
        id: semantic_release_info
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Update Version and Commit
        if: ${{steps.semantic_release_info.outputs.new_release_published == 'true'}}
        env:
          NEW_VERSION: ${{steps.semantic_release_info.outputs.new_release_version}}
        run: |
          echo "Version: $NEW_VERSION"
          sed -i "s/^VERSION: str = \".*\"/VERSION: str = \"$NEW_VERSION\"/g" custom_components/ha_carrier/const.py
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/g" custom_components/ha_carrier/manifest.json
      - name: Verify version updates
        if: ${{steps.semantic_release_info.outputs.new_release_published == 'true'}}
        env:
          NEW_VERSION: ${{steps.semantic_release_info.outputs.new_release_version}}
        run: |
          expected_version="$NEW_VERSION"
          if ! grep -Fq "VERSION: str = \"$expected_version\"" custom_components/ha_carrier/const.py; then
            echo "Expected custom_components/ha_carrier/const.py to contain VERSION: str = \"$expected_version\" after version update" >&2
            exit 1
          fi
          if ! grep -Fq "\"version\": \"$expected_version\"" custom_components/ha_carrier/manifest.json; then
            echo "Expected custom_components/ha_carrier/manifest.json to contain \"version\": \"$expected_version\" after version update" >&2
            exit 1
          fi
      - name: Commit version updates
        if: ${{steps.semantic_release_info.outputs.new_release_published == 'true'}}
        env:
          NEW_VERSION: ${{steps.semantic_release_info.outputs.new_release_version}}
          NEW_GIT_TAG: ${{steps.semantic_release_info.outputs.new_release_git_tag}}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: bumping version to $NEW_VERSION [skip ci]"
          fi
          if ! git rev-parse -q --verify "refs/tags/$NEW_GIT_TAG" >/dev/null; then
            git tag "$NEW_GIT_TAG"
          fi
      - name: Push changes
        if: ${{steps.semantic_release_info.outputs.new_release_published == 'true'}}
        uses: ad-m/github-push-action@v1
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          branch: ${{ github.ref }}
          tags: true
      - name: Create GitHub Release
        if: ${{steps.semantic_release_info.outputs.new_release_published == 'true'}}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.semantic_release_info.outputs.new_release_git_tag }}
          name: ${{ steps.semantic_release_info.outputs.new_release_git_tag }}
          body: ${{ steps.semantic_release_info.outputs.new_release_notes }}
          draft: false
          prerelease: false
